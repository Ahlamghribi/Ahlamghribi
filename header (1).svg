<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;800;900&amp;display=swap');

      .name {
        font-family: "Poppins", "Segoe UI", Arial, sans-serif;
        font-size: 82px;
        font-weight: 900;
        fill: url(#nameGrad);
        letter-spacing: -2px;
        animation: nameReveal 1.2s cubic-bezier(0.16,1,0.3,1) 0.2s both;
      }

      .subtitle {
        font-family: "Poppins", "Segoe UI", Arial, sans-serif;
        font-size: 15px;
        font-weight: 400;
        fill: #9ca3af;
        letter-spacing: 3px;
        animation: fadeUp 1s ease 0.8s both;
      }

      .tagline {
        font-family: "Poppins", "Segoe UI", Arial, sans-serif;
        font-size: 10px;
        font-weight: 600;
        fill: #7c3aed;
        letter-spacing: 5px;
        animation: fadeUp 1s ease 1.2s both;
      }

      .badge-text {
        font-family: "Poppins", "Segoe UI", monospace;
        font-size: 10px;
        font-weight: 600;
      }

      @keyframes nameReveal {
        from { opacity: 0; transform: translateY(40px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes glowPulse {
        0%,100% { opacity: 0.5; }
        50%      { opacity: 1; }
      }

      @keyframes scanline {
        0%   { transform: translateY(-400px); }
        100% { transform: translateY(400px); }
      }

      @keyframes dotBlink {
        0%,100% { opacity: 1; }
        50%      { opacity: 0.3; }
      }

      @keyframes lineGrow {
        from { stroke-dashoffset: 1200; }
        to   { stroke-dashoffset: 0; }
      }

      @keyframes particleFloat {
        0%   { transform: translateY(0px) rotate(0deg); opacity: 0.15; }
        50%  { transform: translateY(-12px) rotate(180deg); opacity: 0.35; }
        100% { transform: translateY(0px) rotate(360deg); opacity: 0.15; }
      }

      .glow-orb { animation: glowPulse 4s ease-in-out infinite; }
      .dot-live { animation: dotBlink 1.5s ease-in-out infinite; }
      .top-line { stroke-dasharray: 1200; animation: lineGrow 2s cubic-bezier(0.16,1,0.3,1) 0s both; }
      .geo1 { animation: particleFloat 6s ease-in-out infinite 0s; transform-origin: 100px 110px; }
      .geo2 { animation: particleFloat 8s ease-in-out infinite 1s; transform-origin: 1080px 290px; }
      .geo3 { animation: particleFloat 7s ease-in-out infinite 2s; transform-origin: 140px 290px; }
      .geo4 { animation: particleFloat 9s ease-in-out infinite 0.5s; transform-origin: 1050px 90px; }
    </style>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080810"/>
      <stop offset="50%" stop-color="#0f0720"/>
      <stop offset="100%" stop-color="#080810"/>
    </linearGradient>

    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <linearGradient id="topLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9333ea" stop-opacity="0"/>
      <stop offset="30%" stop-color="#9333ea" stop-opacity="1"/>
      <stop offset="70%" stop-color="#a855f7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#9333ea" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="bottomLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0"/>
      <stop offset="50%" stop-color="#f59e0b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="underline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9333ea" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#9333ea" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="glowLeft" cx="20%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9333ea" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#9333ea" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowRight" cx="80%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowCenter" cx="50%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>

    <filter id="softBlur">
      <feGaussianBlur stdDeviation="25"/>
    </filter>

    <filter id="nameGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="clip">
      <rect width="1200" height="400"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">

    <!-- Base background -->
    <rect width="1200" height="400" fill="url(#bg)"/>

    <!-- Glow blobs -->
    <ellipse cx="240" cy="200" rx="380" ry="280" fill="url(#glowLeft)" filter="url(#softBlur)"/>
    <ellipse cx="960" cy="160" rx="320" ry="240" fill="url(#glowRight)" filter="url(#softBlur)"/>
    <ellipse cx="600" cy="300" rx="280" ry="180" fill="url(#glowCenter)" filter="url(#softBlur)"/>

    <!-- Subtle grid -->
    <g opacity="0.04" stroke="#9333ea" stroke-width="0.6">
      <line x1="0" y1="80" x2="1200" y2="80"/>
      <line x1="0" y1="160" x2="1200" y2="160"/>
      <line x1="0" y1="240" x2="1200" y2="240"/>
      <line x1="0" y1="320" x2="1200" y2="320"/>
      <line x1="200" y1="0" x2="200" y2="400"/>
      <line x1="400" y1="0" x2="400" y2="400"/>
      <line x1="600" y1="0" x2="600" y2="400"/>
      <line x1="800" y1="0" x2="800" y2="400"/>
      <line x1="1000" y1="0" x2="1000" y2="400"/>
    </g>

    <!-- Scanline sweep -->
    <rect x="0" y="0" width="1200" height="2" fill="url(#topLine)" opacity="0.15" style="animation: scanline 8s linear infinite;"/>

    <!-- Top border line (animated) -->
    <line class="top-line" x1="0" y1="1.5" x2="1200" y2="1.5" stroke="url(#topLine)" stroke-width="2"/>
    <!-- Bottom border line -->
    <line x1="0" y1="398" x2="1200" y2="398" stroke="url(#bottomLine)" stroke-width="1.5"/>

    <!-- Corner triangles -->
    <path d="M0,0 L80,0 L0,80 Z" fill="#9333ea" opacity="0.1"/>
    <path d="M1200,400 L1120,400 L1200,320 Z" fill="#9333ea" opacity="0.1"/>
    <path d="M1200,0 L1140,0 L1200,60 Z" fill="#f59e0b" opacity="0.12"/>
    <path d="M0,400 L60,400 L0,340 Z" fill="#f59e0b" opacity="0.08"/>

    <!-- Left side vertical accent -->
    <rect x="0" y="0" width="2" height="400" fill="url(#underline)" opacity="0.35"/>
    <rect x="1198" y="0" width="2" height="400" fill="url(#underline)" opacity="0.35"/>

    <!-- Floating geometric shapes -->
    <g class="geo1">
      <polygon points="100,90 116,118 84,118" fill="none" stroke="#9333ea" stroke-width="1.2" opacity="0.25"/>
    </g>
    <g class="geo2">
      <polygon points="1080,270 1096,298 1064,298" fill="none" stroke="#a855f7" stroke-width="1.2" opacity="0.2"/>
    </g>
    <g class="geo3">
      <rect x="128" y="278" width="16" height="16" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.2" transform="rotate(25,136,286)"/>
    </g>
    <g class="geo4">
      <circle cx="1050" cy="90" r="10" fill="none" stroke="#9333ea" stroke-width="1" opacity="0.2"/>
    </g>

    <!-- Extra small shapes -->
    <polygon points="980,330 990,314 1000,330" fill="none" stroke="#f59e0b" stroke-width="0.8" opacity="0.15"/>
    <rect x="60" y="170" width="10" height="10" fill="none" stroke="#9333ea" stroke-width="0.8" opacity="0.15" transform="rotate(15,65,175)"/>
    <circle cx="1140" cy="220" r="6" fill="none" stroke="#a855f7" stroke-width="0.8" opacity="0.15"/>

    <!-- Dot matrix top-right -->
    <g class="glow-orb" fill="#9333ea">
      <circle cx="1060" cy="36" r="2" opacity="0.2"/>
      <circle cx="1082" cy="36" r="2" opacity="0.2"/>
      <circle cx="1104" cy="36" r="2" opacity="0.2"/>
      <circle cx="1126" cy="36" r="2" opacity="0.2"/>
      <circle cx="1148" cy="36" r="2" opacity="0.2"/>
      <circle cx="1060" cy="58" r="2" opacity="0.15"/>
      <circle cx="1082" cy="58" r="2" opacity="0.15"/>
      <circle cx="1104" cy="58" r="2" opacity="0.15"/>
      <circle cx="1126" cy="58" r="2" opacity="0.15"/>
      <circle cx="1148" cy="58" r="2" opacity="0.15"/>
      <circle cx="1060" cy="80" r="2" opacity="0.1"/>
      <circle cx="1082" cy="80" r="2" opacity="0.1"/>
      <circle cx="1104" cy="80" r="2" opacity="0.1"/>
      <circle cx="1126" cy="80" r="2" opacity="0.1"/>
      <circle cx="1148" cy="80" r="2" opacity="0.1"/>
    </g>

    <!-- Dot matrix bottom-left -->
    <g fill="#f59e0b">
      <circle cx="36" cy="310" r="1.8" opacity="0.12"/>
      <circle cx="58" cy="310" r="1.8" opacity="0.12"/>
      <circle cx="80" cy="310" r="1.8" opacity="0.12"/>
      <circle cx="36" cy="332" r="1.8" opacity="0.09"/>
      <circle cx="58" cy="332" r="1.8" opacity="0.09"/>
      <circle cx="80" cy="332" r="1.8" opacity="0.09"/>
      <circle cx="36" cy="354" r="1.8" opacity="0.06"/>
      <circle cx="58" cy="354" r="1.8" opacity="0.06"/>
      <circle cx="80" cy="354" r="1.8" opacity="0.06"/>
    </g>

    <!-- Badge: Available for work -->
    <rect x="36" y="36" width="148" height="26" rx="13" fill="#9333ea" opacity="0.1"/>
    <rect x="36" y="36" width="148" height="26" rx="13" fill="none" stroke="#9333ea" stroke-width="0.8" opacity="0.5"/>
    <circle class="dot-live" cx="55" cy="49" r="4" fill="#22c55e" opacity="0.95"/>
    <text class="badge-text" x="66" y="54" fill="#a855f7" opacity="0.95" font-size="10" letter-spacing="0.5">Available for work</text>

    <!-- Main name text -->
    <text class="name" x="600" y="210" text-anchor="middle" filter="url(#nameGlow)">Ahlam Ghribi</text>

    <!-- Underline accent below name -->
    <rect x="340" y="224" width="520" height="1.5" fill="url(#underline)" opacity="0.7" style="animation: fadeUp 1s ease 1s both;"/>

    <!-- Subtitle -->
    <text class="subtitle" x="600" y="268" text-anchor="middle">Full-Stack Developer  ✦  Cybersecurity Engineer</text>

    <!-- Bottom tagline -->
    <text class="tagline" x="600" y="330" text-anchor="middle">BUILDING WHAT MATTERS  —  SECURING WHAT EXISTS</text>

    <!-- Small code hint bottom right -->
    <text x="1155" y="385" text-anchor="end" font-family="monospace" font-size="9" fill="#9333ea" opacity="0.3" letter-spacing="1">v2.0.26</text>

  </g>
</svg>